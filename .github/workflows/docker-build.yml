name: Build Complete Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install bun
        run: npm install -g bun

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build

      - name: Download Go modules
        run: |
          go mod download
          echo "Modules downloaded"

      - name: Build Go binary
        run: |
          echo "=== Build Info ==="
          pwd
          ls -la web/dist/ | head -3
          echo "=== Building ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -ldflags '-s -w' -o new-api-fixed . 2>&1 | tail -50
          echo "=== Exit: $? ==="

      - name: Package
        if: success()
        run: |
          tar -czvf new-api-package.tar.gz new-api-fixed

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: new-api-package
          path: new-api-package.tar.gz
          retention-days: 1
