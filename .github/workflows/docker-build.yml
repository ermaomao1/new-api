name: Build Complete Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install bun
        run: npm install -g bun

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build -ldflags '-s -w' -o new-api-fixed .

      - name: Package binary and dockerfile
        run: |
          cp Dockerfile Dockerfile.simple
          tar -czvf new-api-package.tar.gz new-api-fixed Dockerfile.simple web/dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-package
          path: new-api-package.tar.gz
          retention-days: 1
