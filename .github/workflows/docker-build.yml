name: Build Go Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build -ldflags '-s -w' -o new-api-fixed .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-binary
          path: new-api-fixed
          retention-days: 1
