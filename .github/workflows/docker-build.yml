name: Build Complete Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install bun
        run: npm install -g bun

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build

      - name: Download Go modules
        run: go mod download

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -o new-api-fixed .
          echo "Build exit code: $?"
          ls -la new-api-fixed 2>&1 || echo "Binary not found!"

      - name: Package
        run: |
          ls -la new-api-fixed 2>&1
          tar -czvf new-api-package.tar.gz new-api-fixed
          ls -la new-api-package.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-binary
          path: new-api-package.tar.gz
          retention-days: 1
