name: Build Docker Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t new-api-fixed:latest .

      - name: Save Docker image as artifact
        run: |
          docker save new-api-fixed:latest | gzip > new-api-fixed.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-fixed-image
          path: new-api-fixed.tar.gz
          retention-days: 1
